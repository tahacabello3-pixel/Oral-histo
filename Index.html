<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🦷 Oral Histology · Interactive Review</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #0b1c2f, #030a12);
            min-height: 100vh;
            color: #e3f2fd;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app { max-width: 1300px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 95vh; }
        .main-content { flex: 1; }
        .glass-card, .sheet-card, .question-card, .mode-toggle, .result-card, .review-item {
            background: rgba(10, 25, 40, 0.45);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            transition: all 0.2s ease;
        }
        .glass-card { padding: 24px 22px; }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        h1 {
            font-weight: 700;
            font-size: 2.1rem;
            background: linear-gradient(135deg, #a0e9ff, #4dd0e1, #00bcd4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .mode-toggle {
            display: flex;
            padding: 6px;
            gap: 6px;
            border-radius: 60px;
            background: rgba(0,20,30,0.5);
            border: 1px solid rgba(0,230,250,0.3);
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #b0e0ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .mode-btn.active {
            background: rgba(0,200,255,0.18);
            border: 1px solid #00e5ff;
            color: #d4f4ff;
            box-shadow: 0 0 15px #00bcd4;
        }
        .sheets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .sheet-card {
            padding: 22px 18px;
            cursor: pointer;
            border-left: 4px solid #0cf;
        }
        .sheet-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 30px -8px #00000080, 0 0 20px #00bcd466;
            border: 1px solid #0cf;
        }
        .sheet-title { font-size: 1.4rem; font-weight: 700; color: #e0f2fe; }
        .back-btn {
            background: transparent;
            border: 1px solid #2aa0c0;
            color: #b4e6ff;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 24px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .progress-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .progress-bar-bg { height: 10px; background: #0a1e2b; border-radius: 20px; border: 1px solid #1e5f7a; overflow: hidden; flex: 1; margin-right: 16px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00e5ff, #1e88e5); border-radius: 20px; box-shadow: 0 0 10px #0cf; }
        .shuffle-btn, .share-btn, .copy-all-btn {
            background: rgba(0,188,212,0.15);
            border: 1.5px solid #0cf;
            color: #b0f0ff;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .shuffle-btn:hover, .share-btn:hover, .copy-all-btn:hover {
            background: #0cf3;
            box-shadow: 0 0 15px cyan;
        }
        .quiz-question-card { padding: 28px; margin-bottom: 28px; }
        .question-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 28px; }
        .options-list { display: flex; flex-direction: column; gap: 14px; }
        .option-item {
            background: rgba(0,30,45,0.5); border: 1.5px solid #1e6a7a; border-radius: 60px;
            padding: 16px 22px; font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; gap: 14px;
        }
        .option-item.selected-option { border: 2px solid #0cf; background: #11576b; }
        .option-item.correct-answer { background: #0b4b3c; border-color: #00e676; }
        .option-item.wrong-answer { background: #6b1e2b; border-color: #ff5252; }
        .primary-btn {
            background: rgba(0,188,212,0.2); border: 2px solid #0cf; color: #e1f7ff;
            padding: 16px 38px; border-radius: 60px; font-weight: 700; font-size: 1.2rem;
            backdrop-filter: blur(8px); cursor: pointer; box-shadow: 0 0 15px #00bcd4;
        }
        .primary-btn:disabled { opacity: 0.3; box-shadow: none; }
        .result-card { padding: 40px; text-align: center; }
        .score { font-size: 5rem; font-weight: 800; background: linear-gradient(145deg, #b0f0ff, #4dd0e1); -webkit-background-clip: text; color: transparent; }
        .hidden { display: none !important; }
        .feedback-message { margin: 20px 0 10px; font-size: 1.2rem; }
        .stats-badge {
            background: #0a3340;
            border-radius: 40px;
            padding: 8px 18px;
            border: 1px solid #0cf;
            display: inline-block;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #7ab7c9;
            border-top: 1px solid #1e4a5e;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer a {
            color: #8ed3e8;
            text-decoration: none;
        }
        .action-buttons-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) { h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>
<div id="app">
    <div class="main-content">
        <div class="app-header">
            <h1><i class="fas fa-tooth" style="color:#0cf;"></i> Oral Histology</h1>
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-btn active" data-mode="quiz"><i class="fas fa-pen-to-square"></i> Quiz</button>
                <button class="mode-btn" data-mode="study"><i class="fas fa-book-open"></i> Study</button>
            </div>
        </div>
        <div id="sheetsView">
            <div class="glass-card">
                <h2 style="margin-bottom:24px"><i class="fas fa-layer-group" style="color:#0cf;"></i> Sheets (16 questions each)</h2>
                <div id="sheetsContainer" class="sheets-grid"></div>
            </div>
        </div>
        <div id="quizStudyView" class="view-container hidden">
            <button class="back-btn" id="backToSheetsBtn"><i class="fas fa-arrow-left"></i> Back to Sheets</button>
            <div id="dynamicContent"></div>
        </div>
    </div>
    <div class="footer">
        <span><i class="fas fa-user-graduate"></i> Prepared by Taha Cabello</span>
        <span><i class="fab fa-telegram"></i> Telegram: <a href="https://t.me/zik0d" target="_blank">@zik0d</a></span>
    </div>
</div>
<script>
    (function(){
        // ---------- Full Database (16 questions per sheet) ----------
        const sheets = [
            { id: 'face', name: 'Development of the face', questions: [] },
            { id: 'mouth', name: 'Development of the mouth', questions: [] },
            { id: 'toothdev', name: 'Tooth development and growth', questions: [] },
            { id: 'pulp', name: 'Dental pulp', questions: [] },
            { id: 'enamel', name: 'Enamel', questions: [] },
            { id: 'dentin', name: 'Dentin', questions: [] },
            { id: 'bone', name: 'Alveolar bone', questions: [] },
            { id: 'eruption', name: 'Tooth eruption and shedding', questions: [] },
            { id: 'mucosa', name: 'Oral mucosa', questions: [] }
        ];

        function addQ(sheetId, qArray) {
            const sheet = sheets.find(s => s.id === sheetId);
            if(sheet) sheet.questions.push(...qArray);
        }

        // ========== Development of the face (16) ==========
        addQ('face', [
            { text: 'About mandibular process which of the following are true:', options: ['Develop from first pharyngeal arch','Appear initially as bilateral structures but then merge in midline','Give rise to mandible, lower part of face and lower lip','Both B & C','All of the above'], correct: 4 },
            { text: 'The ossification center of the developing mandible arise between:', options: ['Mental and incisive nerves','Mandibular and maxillary nerves','Superior alveolar and infra-orbital nerve','None of above'], correct: 0 },
            { text: 'The face develops from:', options: ['Two primordial prominences','4 primordial prominences','6 primordial prominences','None of above'], correct: 3 },
            { text: 'About the median cleft lip all of the following are true except:', options: ['It is common condition','Partial or complete failure of medial nasal processes to merge','It is called hare lip','Both B & C'], correct: 0 },
            { text: 'About cleft palate which of the following are true:', options: ['Cleft of soft palate causes problems of speech and swallowing','Cleft palate more common than cleft lip','Cleft of primary palate anterior to incisive foramen result of failure of lateral palatine process','All of the above','None of the above'], correct: 0 },
            { text: 'All the muscles of the tongue innervated by hypoglossal nerve except palatoglossal nerve innervated by:', options: ['Trigeminal nerve','Chorda tympani','Glossopharyngeal nerve','None of the above'], correct: 3 },
            { text: 'The median rhomboid glossitis is:', options: ['Failure of merging between two lateral lingual swellings','The tongue appears formed of three nodules','Small tongue in relation to size of oral cavity','None of the above'], correct: 1 },
            { text: 'All of the following are extrinsic muscles except:', options: ['Superior longitudinal muscle','Styloglossus muscle','Palatoglossus muscle','None of the above'], correct: 0 },
            { text: 'About the tongue which of the following are true:', options: ['The anterior 2/3 develops from three elevations in second pharyngeal arch','The posterior 1/3 develops by two elevation caudally to foramen cecum','All of the above','None of the above'], correct: 1 },
            { text: 'About the secondary palate which of the following are true:', options: ['It is called median palatine process and premaxillary bone','Part of palate posterior to incisive fossa','All of the above','None of the above'], correct: 1 },
            { text: 'About intrinsic muscles which of the following are true:', options: ['They lie entirely within the tongue','Their function: repositioning of the tongue','Types: genioglossus, hyoglossus, palatoglossus','All of the above','None of the above'], correct: 0 },
            { text: 'About bifid tongue which of the following is true:', options: ['Most common malformation of the tongue','Usually seen in mongolism','Tongue appear formed of three nodules','All of the above','None of the above'], correct: 4 },
            { text: 'About development of lip which of the following is true:', options: ['Lower lip develops by merging of mandibular processes','Upper lip formed from 2/3 medial nasal and 1/3 maxillary','Cleft lip is malformation of lower lip','All of the above'], correct: 0 },
            { text: 'About development of mandible which of the following is true:', options: ['It develops as intracartilaginous bone','Meckel\'s cartilage share in ossification','It has two ossification center','Both A & B','None of the above'], correct: 4 },
            { text: 'About development of maxilla which of the following is true:', options: ['One center of ossification close to anterosuperior dental nerve','Two centers at canine fossa','None of the above','All of the above'], correct: 0 },
            { text: 'About age changes of mandible all true except:', options: ['Mandible at birth differs from adult','In senility, resorption increases mandibular angle','Mandibular angle at childhood 110°','Both A & B'], correct: 3 }
        ]);

        // ========== Development of the mouth (16) ==========
        addQ('mouth', [
            { text: 'About cleft palate true:', options: ['Cleft of soft palate causes speech/swallowing problems','Cleft palate more common than cleft lip','Cleft primary palate anterior to incisive foramen failure','All','None'], correct: 0 },
            { text: 'Muscles of tongue except palatoglossus innervated by:', options: ['Trigeminal','Chorda tympani','Glossopharyngeal','None'], correct: 3 },
            { text: 'Median rhomboid glossitis:', options: ['Failure of merging lateral lingual swellings','Tongue appears three nodules','Small tongue','None'], correct: 1 },
            { text: 'All extrinsic muscles except:', options: ['Superior longitudinal','Styloglossus','Palatoglossus','None'], correct: 0 },
            { text: 'All tongue muscles derived from occipital myotomes except:', options: ['Hyoglossus','Genioglossus','Palatoglossus','None'], correct: 2 },
            { text: 'About tongue all true except:', options: ['Muscle covered by mucosa','Formed in floor of stomodeum','Base anterior movable & body posterior attached','None'], correct: 2 },
            { text: 'About tuberculum impar all true except:', options: ['Small central elevation in first arch','Posterior to foramen cecum','None'], correct: 1 },
            { text: 'Trifid tongue true:', options: ['Failure of merging','Common malformation','All','None'], correct: 3 },
            { text: 'About tongue true:', options: ['Anterior 2/3 from three elevations in second arch','Posterior 1/3 two elevations caudal to foramen cecum','All','None'], correct: 1 },
            { text: 'Secondary palate true:', options: ['Median palatine process & premaxilla','Part posterior to incisive fossa','All','None'], correct: 1 },
            { text: 'Bifid tongue true:', options: ['Most common malformation','Seen in mongolism','Three nodules','All','None'], correct: 4 },
            { text: 'Intrinsic muscles true:', options: ['Lie entirely within tongue','Function repositioning','Types: genioglossus etc','All','None'], correct: 0 },
            { text: 'Cleft palate true:', options: ['More common than cleft lip','Failure of fusion zygomatic/maxillary','All','None'], correct: 3 },
            { text: 'Most common tongue malformation:', options: ['Trifid','Bifid','Tongue tie','All','None'], correct: 2 },
            { text: 'Palatal shelf elevation:', options: ['Elevation when strength sufficient','Combined action shelves & tongue','Palatine processes horizontal','All','None'], correct: 3 },
            { text: 'Primary palate true:', options: ['Appear earlier by merging lateral nasal','Wedge shaped posterior to incisive papilla','Called median palatine process','All','None'], correct: 2 }
        ]);

        // ========== Tooth development and growth (16) ==========
        addQ('toothdev', [
            { text: 'First layer of dentin appears in:', options: ['Bud','Cap','Early bell','Late bell'], correct: 3 },
            { text: 'Differentiates into ameloblasts:', options: ['Outer enamel epithelium','Inner enamel epithelium','Stratum intermedium','None'], correct: 1 },
            { text: 'Function of inner enamel epithelium:', options: ['Provide nutrition','Regulate transport dental organ-sac','Regulate transport dental organ-papilla','None'], correct: 2 },
            { text: 'Hertwig sheath made of:', options: ['IEE + OEE','OEE + stellate reticulum','IEE + stratum intermedium','None'], correct: 0 },
            { text: 'High initiation of dental lamina results in:', options: ['Absence','Supernumerary teeth','Incremental lines','All','None'], correct: 1 },
            { text: 'Accessory canals result of:', options: ['Defect cementogenesis','Defect dentinogenesis','Defect Hertwig\'s sheath','All','None'], correct: 2 },
            { text: 'Alkaline phosphatase helps mineralize:', options: ['Dentin','Cementum','Pulp','Root','All','None'], correct: 1 },
            { text: 'Epithelial root sheath of Hertwig:', options: ['IEE+OEE','OEE+stellate','IEE+stratum','None'], correct: 0 },
            { text: 'Tooth germ formed of:', options: ['Papilla+sac+stellate','Organ+papilla+sac','Organ+sac+inner epithelium','Sac+organ+stratum'], correct: 1 },
            { text: 'Function of inner enamel epithelium:', options: ['Nutrition','Regulate organ-sac','Regulate organ-papilla','None'], correct: 2 },
            { text: 'Stratum intermedium at early bell:', options: ['2-3 flat cells between IEE and stellate','Contain alkaline phosphatase for dentin','All','None'], correct: 0 },
            { text: 'High initiation of dental lamina:', options: ['Absence','Supernumerary','Incremental lines','All'], correct: 1 },
            { text: 'Cleft palate true:', options: ['More common than cleft lip','Failure fusion zygomatic/maxillary','All','None'], correct: 3 },
            { text: 'Most common tongue malformation:', options: ['Trifid','Bifid','Tongue tie','All'], correct: 2 },
            { text: 'Palatal shelf elevation:', options: ['Elevation when strength','Combined action','Horizontal position','All'], correct: 3 },
            { text: 'Primary palate true:', options: ['Appear earlier','Wedge shaped','Median palatine process','All'], correct: 2 }
        ]);

        // ========== Dental pulp (16) ==========
        addQ('pulp', [
            { text: 'All principal cells of pulp except:', options: ['Odontoblast','B-lymphocytes','Macrophage','None'], correct: 1 },
            { text: 'Antigen presenting cell in pulp:', options: ['Macrophage','T-lymphocyte','Pericytes','None'], correct: 3 },
            { text: 'Odontoblast true:', options: ['Postmitotic cannot divide','Most prominent','Found in pulp core','All'], correct: 0 },
            { text: 'Contractile cell at capillary periphery:', options: ['Histiocyte','Rouget cell','Dendritic','None'], correct: 1 },
            { text: 'True pulp stone:', options: ['Similar to dentin','No tubules','In chamber','A&C','All'], correct: 0 },
            { text: 'Free denticles true:', options: ['Surrounded by dentin','Cementum','Enamel','None'], correct: 3 },
            { text: 'False denticles true:', options: ['Concentric layers','Rare near apex','All','None'], correct: 0 },
            { text: 'False denticles true:', options: ['Caused by epithelial rests','Near apex','Rare','None'], correct: 3 },
            { text: 'Pulp stones classified by structure:', options: ['Free, attached, embedded','True, false, diffuse','All','None'], correct: 1 },
            { text: 'Attached denticles:', options: ['Fused with pulp','Cementum','Enamel','None'], correct: 3 },
            { text: 'Accessory canals formation:', options: ['Union of extensions','Degeneration of sheath','All','None'], correct: 3 },
            { text: 'Fibers of pulp true:', options: ['Regular arrangement','Type II & IV','Highest concentration apical','A&C','All'], correct: 2 },
            { text: 'Dental pulp true:', options: ['Loose CT from follicle','Apical foramen small eccentric','Glycoproteins dermatan sulfate','All','None'], correct: 4 },
            { text: 'Dystrophic calcification:', options: ['Cementicles','Diffuse around vessels','Vascular changes','B&C'], correct: 1 },
            { text: 'Age changes of pulp true:', options: ['Decrease fibers','Increase organelles','All','None'], correct: 3 },
            { text: 'Age changes pulp:', options: ['Decrease fibers','Decrease vessel calcification','Pulp stones found','All'], correct: 2 }
        ]);

        // ========== Enamel (16) ==========
        addQ('enamel', [
            { text: 'Intertwining of rods at cusp tips:', options: ['Enamel spindle','Gnarled enamel','Incremental lines','Retzius'], correct: 1 },
            { text: 'Enamel tufts are:', options: ['From surface to DEJ','From DEJ toward surface','Odontoblastic processes','None'], correct: 1 },
            { text: 'Dentinoenamel junction:', options: ['Non scalloped','Straight','Scalloped convex to dentin','Scalloped convex to enamel'], correct: 3 },
            { text: 'Absent in all premolars:', options: ['Enamel spindle','Tufts','Neonatal line','All'], correct: 2 },
            { text: 'Result of cracks before eruption:', options: ['Lamellae type A','Lamellae type B','Lamellae type C','All'], correct: 1 },
            { text: 'Enamel spindles:', options: ['Structureless','At surface','Odontoblastic processes','At CEJ'], correct: 2 },
            { text: 'Wrong statement:', options: ['96% organic','2-3% water','1-2% organic','All'], correct: 0 },
            { text: 'Wrong concerning enamel:', options: ['Brittle','Cellular','Non-vital','Insensitive'], correct: 1 },
            { text: 'Primary enamel cuticle:', options: ['Afibrillar cementum','Salivary protein','Structureless','Last product of ameloblast'], correct: 3 },
            { text: 'Length of enamel rods:', options: ['Greater than thickness','Less','Equal','None'], correct: 0 },
            { text: 'Not external manifestation:', options: ['Lamella','Tufts','Cuticle','None','All'], correct: 1 },
            { text: 'Perikymata external manifestation of:', options: ['Enamel rods','Incremental line of Retzius','Nasmyth membrane','Pellicle'], correct: 1 },
            { text: 'Enamel of posterior teeth thickest at:', options: ['Middle buccal','Cervical buccal','Occlusal','Middle lingual'], correct: 2 },
            { text: 'Neonatal lines found except:', options: ['Primary incisors','Permanent canine','Permanent first molar','Primary mandibular incisors'], correct: 1 },
            { text: 'Absent in all third molars:', options: ['Spindle','Tufts','Retzius','Neonatal line'], correct: 3 },
            { text: 'Primary enamel cuticle:', options: ['Afibrillar cementum','Salivary protein','Structureless','Last product of ameloblast'], correct: 3 }
        ]);

        // ========== Dentin (16) ==========
        addQ('dentin', [
            { text: 'Interglobular dentin:', options: ['Unmineralized areas','Hypermineralized','No tubules','Increased collagen'], correct: 0 },
            { text: 'Peritubular vs intertubular:', options: ['Higher collagen','Higher mineral','Lower mineral','More organic'], correct: 1 },
            { text: 'Dentin formed in response to caries:', options: ['Primary','Secondary','Tertiary','Mantle'], correct: 2 },
            { text: 'Sclerotic dentin:', options: ['Increased tubules','Decreased mineralization','Occluded tubules','Increased organic'], correct: 2 },
            { text: 'Age change:', options: ['Transparent dentin','Primary','Mantle','All'], correct: 0 },
            { text: 'Tomes granular layer true:', options: ['No incremental pattern','Looping of tubules','Adjacent CDJ','All'], correct: 3 },
            { text: 'Primary content of dentinal tubules:', options: ['Blood vessels','Nerve fibers','Odontoblastic processes','Ameloblast processes'], correct: 2 },
            { text: 'Highest mineral content:', options: ['Predentin','Intertubular','Cementum','Intratubular'], correct: 3 },
            { text: 'Interglobular dentin spaces:', options: ['No tubules','No collagen','Formed in circumpulpal only','Seen in secondary'], correct: 2 },
            { text: 'Not normal physiological formation:', options: ['Primary+secondary','Secondary+circumpulpal','Tertiary+sclerotic','All'], correct: 2 },
            { text: 'Mantle dentin correct:', options: ['First formed','High mineral','Only root','Less mineralized than circumpulpal'], correct: 3 },
            { text: 'Wrong statement:', options: ['Primary dentin continues throughout life','Dead tract common in primary','Reparative dentin response','Sclerotic defense'], correct: 0 },
            { text: 'Does not increase with age:', options: ['Pulp stones','Sclerotic dentin','Interglobular dentin','Secondary dentin'], correct: 2 },
            { text: 'Amelogenesis and dentinogenesis similar:', options: ['Secrete collagen+HA','Mineralization with HA','Start early bell','Continue throughout life'], correct: 1 },
            { text: 'Primary content dentinal tubules:', options: ['Blood','Nerve','Odontoblastic process','Ameloblast'], correct: 2 },
            { text: 'Interglobular dentin found:', options: ['Near CEJ','Root dentin','Near ADJ','Near CDJ'], correct: 2 }
        ]);

        // ========== Alveolar bone (16) ==========
        addQ('bone', [
            { text: 'About alveolar bone correct:', options: ['Alveolar margin coronal portion','Interradicular septum between roots','All','None'], correct: 2 },
            { text: 'True about alveolar bone:', options: ['Spongy bone sensitive to functional forces','Cancellous unaffected','Teeth with antagonists cancellous reduced','All'], correct: 0 },
            { text: 'Alveolar process called functional because:', options: ['Not dependent on teeth','Not susceptible to changes','Both','None'], correct: 3 },
            { text: 'Characteristics of alveolar bone proper except:', options: ['Lines socket','Thick lamellae of compact','Bundle & Haversian','None'], correct: 1 },
            { text: 'Fenestration is:', options: ['Defect exposing root with margin intact','Defect includes margin','Includes PDL','None'], correct: 0 },
            { text: 'Cribriform plate because:', options: ['Perforated by Volkmann','Thin lamellae','Dense radiopaque','All'], correct: 3 },
            { text: 'Radiographic trabeculae true:', options: ['Regular horizontal maxilla','Numerous delicate mandible','Radiolucent around tooth','All'], correct: 3 },
            { text: 'Alveolar crest X-ray:', options: ['Radiolucent line','Black line','Both','None'], correct: 2 },
            { text: 'Not true age change:', options: ['Osteoporosis','No fatty infiltration','Trabeculae more open','None'], correct: 1 },
            { text: 'Inner thin perforated lamella:', options: ['Spongy','Alveolar bone proper','Cortical plate','Bundle'], correct: 1 },
            { text: 'Lamina dura because:', options: ['Dense radiopaque','Perforated','Lines socket','All'], correct: 3 },
            { text: 'Thicker in mandible than maxilla:', options: ['Spongy','Cortical plate','Bundle','All'], correct: 1 },
            { text: 'Alveolar bone proper except:', options: ['Lines socket','Thick lamellae','Bundle+Haversian','None'], correct: 1 },
            { text: 'Type I trabecula not true:', options: ['Interdental/interradicular','Horizontal ladder','Regular','Found in maxilla','All'], correct: 4 },
            { text: 'True statement:', options: ['Alveolar margin coronal','2 mm coronal to CEJ','Cortical thickest buccal mandibular molars','All'], correct: 3 },
            { text: 'Alveolar bone true:', options: ['Develops end 3rd month fetal','Develops with teeth','Crest 2 mm apical to CEJ','All'], correct: 3 }
        ]);

        // ========== Tooth eruption and shedding (16) ==========
        addQ('eruption', [
            { text: 'Pre-eruptive phase jaw growth:', options: ['Anterior deciduous drift forward','Second molar germs drift backward','All','None'], correct: 2 },
            { text: 'Roots grow toward floor of crypt causes:', options: ['Bone formation','Rapid eruption','All','None'], correct: 3 },
            { text: 'Eruptive phase:', options: ['Bring tooth to occlusion','Ends before emergence','Principal tilting','None'], correct: 0 },
            { text: 'Upper molars development:', options: ['Develop in maxillary tuberosities','Occlusal facing mesially','Develop in rami','None'], correct: 0 },
            { text: 'Shedding:', options: ['Elimination by resorption','Odontoclasts responsible','All','None'], correct: 2 },
            { text: 'Post-eruptive aim:', options: ['Compensate wear','Accommodate growth','All','None'], correct: 2 },
            { text: 'Pre-eruptive phase:', options: ['Late bell till root formation','Position tooth germ','All','None'], correct: 1 },
            { text: 'Premolar resorption occurs on:', options: ['Inner side of deciduous roots','Buccal','Lingual','None'], correct: 0 },
            { text: 'Cause of resorption:', options: ['Pressure from successor','Vascular','PDL traction','None'], correct: 0 },
            { text: 'Tilting movement:', options: ['Mesial','Rotation','Occlusal','None'], correct: 3 },
            { text: 'Remnants of deciduous teeth:', options: ['Ankylosed','Exfoliated','Enclosed in cementum','All'], correct: 3 },
            { text: 'Passive eruption:', options: ['Apical recession of gingiva','Actual tooth movement','All','None'], correct: 0 },
            { text: 'Bone remodeling theory:', options: ['Increased fluid pressure','Selective deposition & resorption','All','None'], correct: 1 },
            { text: 'During eruption:', options: ['Desmolytic enzymes','Erupts without hemorrhage','All','None'], correct: 2 },
            { text: 'Root formation theory:', options: ['Root growth pushes','PDL pulls','All','None'], correct: 0 },
            { text: 'Post-eruptive phase:', options: ['Starts at occlusion','Compensates wear','All','None'], correct: 2 }
        ]);

        // ========== Oral mucosa (16) ==========
        addQ('mucosa', [
            { text: 'Taste bud supporting cells location:', options: ['Inside','Outer','Lamina propria','Submucosa'], correct: 1 },
            { text: 'Melanocyte located in:', options: ['Stratum basale','Granulosum','Dense','Papillary'], correct: 0 },
            { text: 'Oral mucosa composed of:', options: ['Columnar','Cuboidal','Simple stratified','Stratified squamous'], correct: 3 },
            { text: 'Masticatory mucosa found:', options: ['Floor','Dorsal tongue','Soft palate','Ventral tongue'], correct: 1 },
            { text: 'Oral mucosa composed:', options: ['Stratified squamous + lamina propria','Simple squamous + lamina','Lamina+submucosa','Lamina+CT'], correct: 0 },
            { text: 'True keratinized epithelium:', options: ['Cell content present','Nuclei present','Absence of nuclei superficial','All'], correct: 2 },
            { text: 'Lamina propria divided:', options: ['Submucosa+reticular','Papillary+reticular','Papillary+submucosa','Rete+reticular'], correct: 1 },
            { text: 'Lining mucosa:', options: ['Keratinized','Parakeratinized','Nonkeratinized','None'], correct: 2 },
            { text: 'Merkel cells located:', options: ['Stratum basale','Granulosum','Dense','Papillary'], correct: 0 },
            { text: 'Vermilion border:', options: ['Floor-dorsal','Soft-hard palate','Oral mucosa-skin of lip','None'], correct: 2 },
            { text: 'Taste buds derived from:', options: ['Epithelium','Connective','Nerve','Muscle'], correct: 0 },
            { text: 'Foliate papillae:', options: ['Without taste buds','von Ebner','Salivary gland','Contain taste buds'], correct: 3 },
            { text: 'Layer responsible for cell division:', options: ['Basal','Intermediate','Granular','Keratin'], correct: 0 },
            { text: 'Filiform papillae:', options: ['Contain taste buds','Without taste buds','von Ebner','Salivary gland'], correct: 1 },
            { text: 'Keratinocytes:', options: ['Melanocytes','Supporting','Defense','Basal cell'], correct: 3 },
            { text: 'Shape of taste bud:', options: ['Square','Barrel','Flat','Cuboidal'], correct: 1 }
        ]);

        // ---------- App State ----------
        let currentMode = 'quiz';
        let currentSheetId = null;
        let currentQuestions = [];
        let quizState = {
            currentIndex: 0,
            userAnswers: [],
            answerConfirmed: false,
            selectedOption: null,
            quizFinished: false,
            score: 0
        };

        const sheetsView = document.getElementById('sheetsView');
        const quizStudyView = document.getElementById('quizStudyView');
        const dynamicContent = document.getElementById('dynamicContent');
        const sheetsContainer = document.getElementById('sheetsContainer');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const backBtn = document.getElementById('backToSheetsBtn');

        function renderSheets() {
            sheetsContainer.innerHTML = '';
            sheets.forEach(sheet => {
                const card = document.createElement('div');
                card.className = 'sheet-card';
                card.dataset.sheetId = sheet.id;
                card.innerHTML = `<div class="sheet-title"><i class="fas fa-folder-open"></i> ${sheet.name}</div>
                                  <div><i class="fas fa-circle-question"></i> ${sheet.questions.length} Questions</div>`;
                card.addEventListener('click', () => selectSheet(sheet.id));
                sheetsContainer.appendChild(card);
            });
        }

        function selectSheet(sheetId) {
            const sheet = sheets.find(s => s.id === sheetId);
            if(!sheet) return;
            currentSheetId = sheetId;
            currentQuestions = [...sheet.questions];
            resetQuizState();
            sheetsView.classList.add('hidden');
            quizStudyView.classList.remove('hidden');
            if(currentMode === 'quiz') renderQuizView();
            else renderStudyView();
        }

        function resetQuizState() {
            quizState = {
                currentIndex: 0,
                userAnswers: new Array(currentQuestions.length).fill(null).map(() => ({ selected: null, isCorrect: false })),
                answerConfirmed: false,
                selectedOption: null,
                quizFinished: false,
                score: 0
            };
        }

        function backToSheets() {
            sheetsView.classList.remove('hidden');
            quizStudyView.classList.add('hidden');
            currentSheetId = null;
        }

        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
            if(currentSheetId) {
                resetQuizState();
                if(mode === 'quiz') renderQuizView();
                else renderStudyView();
            }
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function shuffleQuestions() {
            if(currentMode !== 'quiz' || quizState.quizFinished) return;
            const currentAnswers = quizState.userAnswers;
            const paired = currentQuestions.map((q, idx) => ({ question: q, answer: currentAnswers[idx] }));
            shuffleArray(paired);
            currentQuestions = paired.map(p => p.question);
            quizState.userAnswers = paired.map(p => p.answer);
            quizState.currentIndex = 0;
            quizState.answerConfirmed = false;
            quizState.selectedOption = null;
            renderQuizView();
        }

        function shareCurrentQuestion() {
            if (!currentQuestions.length) return;
            const q = currentQuestions[quizState.currentIndex];
            const sheetName = sheets.find(s => s.id === currentSheetId)?.name || '';
            const correctLetter = String.fromCharCode(65 + q.correct);
            let text = `🦷 *Oral Histology - ${sheetName}*\n\n`;
            text += `❓ *Question:* ${q.text}\n\n`;
            q.options.forEach((opt, i) => {
                text += `${String.fromCharCode(65+i)}) ${opt}\n`;
            });
            text += `\n✅ *Correct Answer:* ${correctLetter}. ${q.options[q.correct]}\n\n`;
            text += `📩 Shared by @zik0d - Prepared by Taha Cabello`;
            
            navigator.clipboard?.writeText(text.replace(/\*/g, '')).then(() => {
                alert('✅ Question copied. You can paste it in Telegram.');
            }).catch(() => {
                alert('📋 Text ready:\n\n' + text);
            });
            window.open(`https://t.me/zik0d`, '_blank');
        }

        function copyAllStudyQuestions() {
            if (!currentQuestions.length) return;
            const sheetName = sheets.find(s => s.id === currentSheetId)?.name || '';
            let text = `🦷 *Oral Histology - ${sheetName}* - All Questions\n`;
            text += `Prepared by Taha Cabello (@zik0d)\n\n`;
            currentQuestions.forEach((q, idx) => {
                const correctLetter = String.fromCharCode(65 + q.correct);
                text += `🔹 ${idx+1}. ${q.text}\n`;
                q.options.forEach((opt, i) => {
                    text += `   ${String.fromCharCode(65+i)}) ${opt}\n`;
                });
                text += `   ✅ Answer: ${correctLetter}. ${q.options[q.correct]}\n\n`;
            });
            navigator.clipboard?.writeText(text.replace(/\*/g, '')).then(() => {
                alert('✅ All questions copied.');
            }).catch(() => {
                alert('Copy failed. Text logged to console.');
                console.log(text);
            });
        }

        function renderQuizView() {
            if(!currentQuestions.length) { dynamicContent.innerHTML = '<p>No questions found.</p>'; return; }
            if(quizState.quizFinished) { renderQuizResult(); return; }
            const q = currentQuestions[quizState.currentIndex];
            const progress = ((quizState.currentIndex) / currentQuestions.length) * 100;
            const ans = quizState.userAnswers[quizState.currentIndex];
            const confirmed = ans.selected !== null;
            const correctCount = quizState.userAnswers.filter(a => a.isCorrect).length;
            
            let optsHtml = '';
            q.options.forEach((opt, idx) => {
                let cls = '';
                if(confirmed) {
                    if(idx === q.correct) cls = 'correct-answer';
                    else if(idx === ans.selected) cls = 'wrong-answer';
                } else if(quizState.selectedOption === idx) cls = 'selected-option';
                optsHtml += `<div class="option-item ${cls}" data-opt-index="${idx}"><span class="option-prefix">${String.fromCharCode(65+idx)}</span> ${opt}</div>`;
            });

            let actionButtonHtml = '';
            let feedbackHtml = '';
            if(!confirmed) {
                actionButtonHtml = `<button class="primary-btn" id="verifyAnswerBtn" ${quizState.selectedOption === null ? 'disabled' : ''}><i class="fas fa-check-circle"></i> Check Answer</button>`;
            } else {
                const isCorrect = ans.isCorrect;
                const correctLetter = String.fromCharCode(65 + q.correct);
                feedbackHtml = `<div class="feedback-message" style="color: ${isCorrect ? '#00e676' : '#ff5252'};">
                    <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                    ${isCorrect ? 'Correct!' : `Incorrect. The correct answer is ${correctLetter}. ${q.options[q.correct]}`}
                </div>`;
                actionButtonHtml = `<button class="primary-btn" id="nextQuestionBtn"><i class="fas fa-arrow-right"></i> Next Question</button>`;
            }

            dynamicContent.innerHTML = `
                <div class="progress-section">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>Question ${quizState.currentIndex+1}/${currentQuestions.length}</span>
                        <span class="stats-badge"><i class="fas fa-check"></i> ${correctCount} / ${currentQuestions.length}</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="shuffle-btn" id="shuffleQuestionsBtn"><i class="fas fa-shuffle"></i> Shuffle</button>
                        <button class="share-btn" id="shareQuestionBtn"><i class="fab fa-telegram"></i> Share</button>
                    </div>
                </div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width:${progress}%"></div></div>
                <div class="quiz-question-card glass-card" style="margin-top:20px;">
                    <div class="question-text">${q.text}</div>
                    <div class="options-list" id="optionsContainer">${optsHtml}</div>
                    ${feedbackHtml}
                    <div class="next-btn-wrapper">${actionButtonHtml}</div>
                </div>`;

            const optsDivs = document.querySelectorAll('.option-item');
            const shuffleBtn = document.getElementById('shuffleQuestionsBtn');
            const shareBtn = document.getElementById('shareQuestionBtn');
            if(shuffleBtn) shuffleBtn.addEventListener('click', shuffleQuestions);
            if(shareBtn) shareBtn.addEventListener('click', shareCurrentQuestion);
            
            if(!confirmed) {
                optsDivs.forEach(opt => {
                    opt.addEventListener('click', () => {
                        if(quizState.answerConfirmed) return;
                        const idx = parseInt(opt.dataset.optIndex);
                        quizState.selectedOption = idx;
                        optsDivs.forEach(el => el.classList.remove('selected-option'));
                        opt.classList.add('selected-option');
                        document.getElementById('verifyAnswerBtn').disabled = false;
                    });
                });

                document.getElementById('verifyAnswerBtn').addEventListener('click', () => {
                    if(quizState.selectedOption === null) return;
                    const isCorrect = (quizState.selectedOption === q.correct);
                    quizState.userAnswers[quizState.currentIndex] = { selected: quizState.selectedOption, isCorrect };
                    quizState.answerConfirmed = true;
                    quizState.score = quizState.userAnswers.filter(a => a.isCorrect).length;
                    renderQuizView();
                });
            } else {
                optsDivs.forEach(opt => opt.style.pointerEvents = 'none');
                document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                    if(quizState.currentIndex + 1 < currentQuestions.length) {
                        quizState.currentIndex++;
                        quizState.answerConfirmed = false;
                        quizState.selectedOption = null;
                        renderQuizView();
                    } else {
                        quizState.quizFinished = true;
                        renderQuizResult();
                    }
                });
            }
        }

        function renderQuizResult() {
            const correct = quizState.userAnswers.filter(a => a.isCorrect).length;
            const total = currentQuestions.length;
            const percent = Math.round((correct/total)*100);
            let message = percent>=80 ? '🌟 Excellent!' : percent>=50 ? '👍 Good job, keep reviewing.' : '📚 More practice needed.';
            dynamicContent.innerHTML = `<div class="result-card glass-card">
                <i class="fas fa-trophy" style="font-size:4rem;color:gold;"></i><h2>Quiz Finished</h2>
                <div class="score">${correct}/${total}</div>
                <div style="font-size:2rem; margin:10px 0;">${percent}%</div>
                <div style="margin-bottom:30px;">${message}</div>
                <div class="action-buttons-group">
                    <button class="primary-btn" id="retakeQuizBtn"><i class="fas fa-rotate-right"></i> Retake</button>
                    <button class="primary-btn" id="reviewMistakesBtn"><i class="fas fa-list-check"></i> Review Mistakes</button>
                </div>
            </div>`;
            document.getElementById('retakeQuizBtn').addEventListener('click', ()=>{ resetQuizState(); renderQuizView(); });
            document.getElementById('reviewMistakesBtn').addEventListener('click', ()=>{ renderReviewMistakes(); });
        }

        function renderReviewMistakes() {
            const mistakes = currentQuestions.filter((q,i) => quizState.userAnswers[i] && !quizState.userAnswers[i].isCorrect);
            if(!mistakes.length) { dynamicContent.innerHTML = '<div class="glass-card" style="padding:30px">🎉 No mistakes!</div>'; return; }
            let html = `<h2>Review Mistakes (${mistakes.length})</h2>`;
            mistakes.forEach((q) => {
                const idx = currentQuestions.indexOf(q);
                const user = quizState.userAnswers[idx].selected;
                html += `<div class="review-item glass-card"><div class="question-text">${q.text}</div><div class="user-wrong">Your answer: ${q.options[user]}</div><div style="color:#0f0">Correct: ${q.options[q.correct]}</div></div>`;
            });
            dynamicContent.innerHTML = html;
        }

        function renderStudyView() {
            const sheet = sheets.find(s=>s.id===currentSheetId);
            let html = `<div style="display:flex; justify-content:space-between; align-items:center;"><h2>${sheet?.name}</h2>`;
            html += `<button class="copy-all-btn" id="copyAllStudyBtn"><i class="fas fa-copy"></i> Copy All Questions</button></div>`;
            currentQuestions.forEach((q,i) => {
                html += `<div class="study-question-item glass-card"><div class="question-text">${i+1}. ${q.text}</div><div class="options-list">`;
                q.options.forEach((opt, optIdx) => { 
                    html += `<div class="option-item" style="pointer-events:none;${optIdx===q.correct?'border-color:#0f0;background:#0a4b3c;':''}"><span class="option-prefix">${String.fromCharCode(65+optIdx)}</span> ${opt}</div>`; 
                });
                html += `</div><div class="correct-indicator"><i class="fas fa-check-circle"></i> ${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}</div></div>`;
            });
            dynamicContent.innerHTML = html;
            document.getElementById('copyAllStudyBtn')?.addEventListener('click', copyAllStudyQuestions);
        }

        modeBtns.forEach(btn => btn.addEventListener('click', e => setMode(btn.dataset.mode)));
        backBtn.addEventListener('click', backToSheets);
        renderSheets();
        setMode('quiz');
    })();
</script>
</body>
</html>
